<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>公關品資源管理系統 - 申請狀態看板</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- 引入 Google Fonts: Plus Jakarta Sans & Noto Sans TC -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<!-- 引入 Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
<style>
:root {
  --primary-color: #6366F1;
  --primary-hover: #4F46E5;
  --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
  --card-bg: rgba(255, 255, 255, 0.85);
  --glass-border: rgba(255, 255, 255, 0.5);
  --text-main: #1e293b;
  --text-muted: #64748b;
  --danger-color: #ef4444;
  --success-color: #10b981;
}

body {
  font-family: 'Plus Jakarta Sans', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: var(--bg-gradient);
  background-attachment: fixed;
  color: var(--text-main);
  padding: 60px 20px;
  margin: 0;
  min-height: 100vh;
}

/* 網頁背景發光球 */
body::before, body::after {
  content: "";
  position: fixed;
  width: 320px;
  height: 320px;
  border-radius: 50%;
  z-index: -1;
  filter: blur(90px);
  opacity: 0.45;
  pointer-events: none;
}
body::before {
  background: rgba(99, 102, 241, 0.3); /* indigo */
  top: 8%;
  left: 8%;
}
body::after {
  background: rgba(16, 185, 129, 0.2); /* emerald */
  bottom: 12%;
  right: 8%;
}

h1 {
  text-align: center;
  margin-bottom: 6px;
  font-weight: 900;
  font-size: 36px;
  color: #0f172a;
  letter-spacing: -0.5px;
}

.subtitle {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 50px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2.5px;
}

/* ===== 導航區 ===== */
.nav-actions {
  max-width: 1200px;
  margin: 0 auto 16px;
  text-align: right;
}

.apply-btn {
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 700;
  background: var(--card-bg);
  color: var(--primary-color);
  border: 1px solid rgba(99, 102, 241, 0.3);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.05);
}

.apply-btn:hover {
  background: var(--primary-color);
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(99, 102, 241, 0.25);
}

/* ===== 查詢區 ===== */
.search-box {
  max-width: 1200px;
  margin: 0 auto 36px;
  display: flex;
  gap: 16px;
  background: var(--card-bg);
  padding: 18px;
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  box-shadow: 0 20px 40px rgba(31, 38, 135, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.search-box input {
  flex: 1;
  padding: 12px 18px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.08);
  font-size: 15px;
  font-weight: 500;
  background: rgba(255, 255, 255, 0.8);
  transition: all 0.3s ease;
}

.search-box input:focus {
  outline: none;
  border-color: var(--primary-color);
  box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
  background: #fff;
}

.search-box button {
  padding: 12px 32px;
  border: none;
  border-radius: 12px;
  background: var(--primary-color);
  color: #fff;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
}

.search-box button:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
}

/* ===== 卡片看板 ===== */
.board {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 28px;
  max-width: 1200px;
  margin: auto;
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 28px;
  border: 1px solid var(--glass-border);
  box-shadow: 0 12px 40px rgba(31, 38, 135, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.6);
  display: flex;
  flex-direction: column;
  transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 45px rgba(31, 38, 135, 0.08);
}

.title {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 12px;
  color: #0f172a;
}

.sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 6px;
  font-weight: 500;
}

.money {
  font-size: 16px;
  font-weight: 800;
  color: var(--primary-color);
  margin: 12px 0;
}

/* ===== 狀態列 Timeline ===== */
.timeline {
  display: flex;
  align-items: center;
  margin: 24px 0;
  position: relative;
  z-index: 1;
}

.step {
  flex: 1;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  position: relative;
  color: #94a3b8;
}

.step::before {
  content: '';
  display: block;
  width: 14px;
  height: 14px;
  margin: 0 auto 8px;
  border-radius: 50%;
  background: #cbd5e1;
  border: 3px solid #fff;
  box-shadow: 0 0 0 2px #cbd5e1;
  transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.step::after {
  content: '';
  position: absolute;
  top: 8px;
  left: 50%;
  width: 100%;
  height: 4px;
  background: #cbd5e1;
  z-index: -1;
  transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.step:last-child::after {
  display: none;
}

/* 狀態啟用樣式 */
.step.done {
  color: var(--primary-color);
}
.step.done::before {
  background: var(--primary-color);
  box-shadow: 0 0 0 2px var(--primary-color);
}
.step.done::after {
  background: var(--primary-color);
}

/* 當前狀態呼吸燈特效 */
@keyframes pulse {
  0% {
    box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5);
  }
  70% {
    box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
  }
}
.step.current {
  color: var(--success-color);
  font-weight: 800;
}
.step.current::before {
  background: var(--success-color);
  box-shadow: 0 0 0 2px var(--success-color);
  transform: scale(1.25);
  animation: pulse 2s infinite;
}

/* 異常狀態呼吸燈特效 */
@keyframes exceptionPulse {
  0% {
    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6);
  }
  70% {
    box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
  }
}
.step.exception {
  color: var(--danger-color);
  font-weight: 800;
}
.step.exception::before {
  background: var(--danger-color);
  box-shadow: 0 0 0 2px var(--danger-color);
  transform: scale(1.25);
  animation: exceptionPulse 2s infinite;
}

/* ===== 明細與收合按鈕 (含平滑過渡動畫) ===== */
.details {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), opacity 0.3s ease, padding 0.3s;
  opacity: 0;
  font-size: 13px;
  color: #334155;
  border-top: 1px dashed rgba(0,0,0,0);
  padding-top: 0;
  margin-top: 0;
  line-height: 1.7;
}

.details.open {
  max-height: 250px; /* 大容量保險高度 */
  opacity: 1;
  border-top: 1px dashed rgba(0,0,0,0.08);
  padding-top: 14px;
  margin-top: 14px;
}

.toggle-btn {
  margin-top: 14px;
  background: transparent;
  border: 1px solid rgba(99, 102, 241, 0.2);
  border-radius: 10px;
  color: var(--primary-color);
  padding: 8px 18px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  transition: all 0.2s ease;
  align-self: flex-start;
}

.toggle-btn:hover {
  background: rgba(99, 102, 241, 0.05);
  border-color: var(--primary-color);
}

/* ===== 結案清單 ===== */
.archive {
  max-width: 1200px;
  margin: 54px auto 0;
}

.archive h3 {
  cursor: pointer;
  font-size: 18px;
  color: #0f172a;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
  font-weight: 800;
}

.archive table {
  width: 100%;
  border-collapse: collapse;
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  margin-top: 16px;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--glass-border);
  box-shadow: 0 10px 40px rgba(31, 38, 135, 0.03);
  display: none;
}

.archive th, .archive td {
  border-bottom: 1px solid rgba(0,0,0,0.04);
  padding: 18px;
  font-size: 14px;
  text-align: left;
}

.archive th {
  background: rgba(0,0,0,0.01);
  color: #475569;
  font-weight: 800;
}

.archive tr:last-child td {
  border-bottom: none;
}

/* Setup Assistant Overlay */
.setup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.7);
  backdrop-filter: blur(12px);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.setup-card {
  background: #fff;
  padding: 36px;
  border-radius: 24px;
  max-width: 450px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  text-align: center;
}

.setup-card h2 {
  margin-top: 0;
  color: #0f172a;
  font-size: 22px;
  font-weight: 800;
}

.setup-card p {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 24px;
  line-height: 1.5;
}

.setup-input {
  width: 100%;
  padding: 12px;
  margin-bottom: 16px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  box-sizing: border-box;
  font-size: 14px;
}

.setup-btn {
  width: 100%;
  padding: 12px;
  background: var(--primary-color);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.2s;
}

.setup-btn:hover {
  background: var(--primary-hover);
}

@media (max-width: 768px) {
  .search-box {
    flex-direction: column;
    gap: 12px;
  }
  .search-box button {
    width: 100%;
  }
  .archive table {
    display: block;
    overflow-x: auto;
  }
}
</style>
</head>

<body>

<h1>公關品資源管理系統</h1>
<div class="subtitle">Public Relations Resource Management System - 看板</div>

<!-- Supabase 連線設定小幫手 (僅在未填憑證時顯示) -->
<div id="setupAssistant" class="setup-overlay" style="display:none;">
  <div class="setup-card">
    <h2>🔑 串接您的 Supabase 專案</h2>
    <p>系統檢測到您尚未設定 Supabase 憑證。請輸入專案 URL 與 Anon Key 以進行資料庫連線：</p>
    <input type="text" id="setupUrl" class="setup-input" placeholder="Supabase Project URL" />
    <input type="text" id="setupKey" class="setup-input" placeholder="Supabase Anon Key" />
    <button type="button" class="setup-btn" onclick="saveCredentials()">確認並儲存</button>
  </div>
</div>

<div class="nav-actions">
  <button class="apply-btn" onclick="goToApplyPage()">➕ 新增案件申請</button>
</div>

<div class="search-box">
  <input id="staffInput" placeholder="輸入申請人員編查詢訂單" />
  <button onclick="loadData()">查詢</button>
</div>

<div class="board" id="activeBoard"></div>

<div id="loadingHint" style="
  max-width:1200px;
  margin:40px auto;
  text-align:center;
  color:var(--text-muted);
  font-size:16px;
  font-weight: 600;
">
  ⏳ 資料載入中，請稍候…
</div>

<div class="archive">
  <h3 onclick="toggleArchive()"><span id="archiveToggleIcon">▸</span> 結案清單（歷史紀錄）</h3>
  <table id="archiveTable">
    <thead>
      <tr>
        <th>訂單編號</th>
        <th>申請人</th>
        <th>部門</th>
        <th>申請內容</th>
        <th>總金額</th>
        <th>異動日期</th>
      </tr>
    </thead>
    <tbody id="archiveBody"></tbody>
  </table>
</div>

<script>
// =========================================================================
// 1. Supabase 憑證設定與初始化
// =========================================================================
const DEFAULT_SUPABASE_URL = 'https://awqrpzgkndysizvwqfmy.supabase.co';
const DEFAULT_SUPABASE_ANON_KEY = 'sb_publishable_6Km_NaLMwawXQD9lMH7aMw_AsQmjGU0';

let supabaseUrl = localStorage.getItem('supabaseUrl') || DEFAULT_SUPABASE_URL;
let supabaseKey = localStorage.getItem('supabaseKey') || DEFAULT_SUPABASE_ANON_KEY;

// 檢查是否需要顯示設定小幫手
if (supabaseUrl === 'YOUR_SUPABASE_URL' || supabaseKey === 'YOUR_SUPABASE_ANON_KEY' || !supabaseUrl || !supabaseKey) {
    document.getElementById('setupAssistant').style.display = 'flex';
}

function saveCredentials() {
    const url = document.getElementById('setupUrl').value.trim();
    const key = document.getElementById('setupKey').value.trim();
    if (!url || !key) {
        alert('請確實填寫 URL 與 Key');
        return;
    }
    localStorage.setItem('supabaseUrl', url);
    localStorage.setItem('supabaseKey', key);
    window.location.reload();
}

let supabaseClient = null;
if (supabaseUrl && supabaseUrl !== 'YOUR_SUPABASE_URL' && supabaseKey && supabaseKey !== 'YOUR_SUPABASE_ANON_KEY') {
    supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
}

// =========================================================================
// 2. 業務邏輯與畫面渲染
// =========================================================================
let ALL_DATA = [];

/* ===== 時間格式統一 ===== */
function fmtDateTime(v) {
  if (!v) return '-';
  const d = new Date(v);
  if (isNaN(d)) return v;

  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const h = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${y}-${m}-${day} ${h}:${min}`;
}

/* ===== 載入資料 ===== */
async function loadData(){
  if (!supabaseClient) return;

  // 顯示 loading
  document.getElementById('loadingHint').style.display = 'block';
  document.getElementById('loadingHint').textContent = '⏳ 資料載入中，請稍候…';
  document.getElementById('activeBoard').innerHTML = '';
  document.getElementById('archiveBody').innerHTML = '';

  try {
    // 直接從 Supabase 讀取 applications 加上對應的 application_items (明細)
    const { data, error } = await supabaseClient
      .from('applications')
      .select('*, application_items(*)')
      .order('created_at', { ascending: false });

    if (error) throw error;

    ALL_DATA = data || [];
    applyFilter();
    document.getElementById('loadingHint').style.display = 'none';

  } catch (e) {
    console.error('載入訂單失敗:', e);
    document.getElementById('loadingHint').textContent = '⚠️ 資料載入失敗，請檢查網路或專案 SQL 初始化設定';
  }
}

function renderActive(list){
  const box = document.getElementById('activeBoard');
  box.innerHTML = '';

  if (list.length === 0) {
    box.innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px 0; font-weight: 600;">
        🔍 尚無進行中的申請案。
      </div>
    `;
    return;
  }

  list.forEach(o => {
    const statusUpper = String(o.status || '').toUpperCase();
    box.innerHTML += `
    <div class="card">
      <div class="title">${o.applicant_name}（${o.staff_id}）｜${o.department}</div>
      <div class="sub">訂單編號：${o.task_id}</div>
      <div class="sub">申請日期：${fmtDateTime(o.created_at)}</div>
      <div class="money">總金額：NT$ ${Number(o.total_amount).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>

      <div class="timeline">
        <div class="step done">申請提出</div>

        <div class="step ${
          statusUpper === 'PREPARING' ? 'current'
          : ['READY', 'EXCEPTION', 'END'].includes(statusUpper) ? 'done' : ''
        }">商品準備中</div>

        <div class="step ${
          statusUpper === 'READY' ? 'current'
          : ['END'].includes(statusUpper) ? 'done' : ''
        }">已通知領取</div>

        <div class="step ${
          statusUpper === 'EXCEPTION' ? 'exception current' : ''
        }">異常通知</div>
      </div>

      <button class="toggle-btn" onclick="toggleDetails(this)">查看案件明細</button>
      <div class="details">
        ${(o.application_items || []).map(i => `• ${i.item_name} × ${i.quantity}`).join('<br>')}
        ${(statusUpper === 'EXCEPTION' && o.review_comment) ? `<br><strong style="color:var(--danger-color); display:block; margin-top: 10px;">⚠️ 異常說明：${o.review_comment}</strong>` : ''}
      </div>
    </div>`;
  });
}

function renderArchive(list){
  const body = document.getElementById('archiveBody');
  body.innerHTML = '';

  if (list.length === 0) {
    body.innerHTML = `
      <tr>
        <td colspan="6" style="text-align:center; color: var(--text-muted); padding: 20px;">尚無結案紀錄。</td>
      </tr>
    `;
    return;
  }

  list.forEach(o => {
    body.innerHTML += `
    <tr>
      <td style="font-weight: 800; color: #0f172a;">${o.task_id}</td>
      <td>${o.applicant_name}（${o.staff_id}）</td>
      <td>${o.department}</td>
      <td>${(o.application_items || []).map(i => `${i.item_name} × ${i.quantity}`).join('<br>')}</td>
      <td style="font-weight: 800; color: var(--primary-color);">NT$ ${Number(o.total_amount).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
      <td>${fmtDateTime(o.updated_at || o.created_at)}</td>
    </tr>`;
  });
}

function toggleDetails(btn){
  const d = btn.nextElementSibling;
  const open = d.classList.toggle('open');
  btn.textContent = open ? '收合案件明細' : '查看案件明細';
}

function toggleArchive(){
  const t = document.getElementById('archiveTable');
  const icon = document.getElementById('archiveToggleIcon');
  const open = t.style.display === 'table';
  t.style.display = open ? 'none' : 'table';
  icon.textContent = open ? '▸' : '▾';
}

function applyFilter() {
  const staff = document.getElementById('staffInput').value.trim();

  // 若有輸入員編則篩選該員編
  const filtered = staff
    ? ALL_DATA.filter(o => String(o.staff_id).includes(staff))
    : ALL_DATA;

  const ACTIVE_STATUS = ['SUBMITTED', 'PREPARING', 'READY', 'EXCEPTION'];

  const activeList = filtered.filter(o =>
    ACTIVE_STATUS.includes(
      String(o.status).trim().toUpperCase()
    )
  );

  const archiveList = filtered.filter(o =>
    String(o.status).trim().toUpperCase() === 'END'
  );

  renderActive(activeList);
  renderArchive(archiveList);
}

function goToApplyPage() {
    window.location.href = 'index.html';
}

// 頁面載入後自動載入資料
document.addEventListener('DOMContentLoaded', () => {
    if (supabaseClient) {
        loadData();
    }
});
</script>

</body>
</html>
