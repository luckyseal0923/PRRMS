<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>公關品資源管理系統 (PRRMS)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- 引入 Google Fonts: Plus Jakarta Sans & Noto Sans TC -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<!-- 引入 Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --primary-color: #6366F1;
  --primary-hover: #4F46E5;
  --primary-gradient: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
  --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
  --card-bg: rgba(255, 255, 255, 0.8);
  --glass-border: rgba(255, 255, 255, 0.5);
  --text-main: #1e293b;
  --text-muted: #64748b;
  --danger-color: #ef4444;
  --danger-gradient: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
  --success-color: #10b981;
}

body {
  font-family: 'Plus Jakarta Sans', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: var(--bg-gradient);
  background-attachment: fixed;
  color: var(--text-main);
  padding: 60px 20px;
  margin: 0;
  min-height: 100vh;
}

/* 網頁背景發光球 */
body::before, body::after {
  content: "";
  position: fixed;
  width: 320px;
  height: 320px;
  border-radius: 50%;
  z-index: -1;
  filter: blur(90px);
  opacity: 0.45;
  pointer-events: none;
}
body::before {
  background: rgba(99, 102, 241, 0.3); /* indigo */
  top: 8%;
  left: 8%;
}
body::after {
  background: rgba(16, 185, 129, 0.2); /* emerald */
  bottom: 12%;
  right: 8%;
}

h1 {
  text-align: center;
  margin-bottom: 6px;
  font-weight: 900;
  font-size: 36px;
  color: #0f172a;
  letter-spacing: -0.5px;
}

.subtitle {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 50px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2.5px;
}

form {
  position: relative; /* 啟用相對定位以支援內部右上角導覽按鈕 */
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  max-width: 1100px;
  margin: auto;
  padding: 48px;
  border-radius: 28px;
  border: 1px solid var(--glass-border);
  box-shadow: 0 20px 50px rgba(31, 38, 135, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
}

fieldset {
  border: none;
  margin-bottom: 44px;
  padding: 0;
}

legend {
  font-weight: 800;
  margin-bottom: 28px;
  font-size: 20px;
  color: #0f172a;
  border-left: 6px solid var(--primary-color);
  padding-left: 14px;
  letter-spacing: 0.5px;
}

.row {
  display: flex;
  gap: 24px;
  margin-bottom: 24px;
}

label {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: #334155;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input[type="text"],
input[type="email"] {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-radius: 14px;
  font-size: 15px;
  background: rgba(255, 255, 255, 0.7);
  box-sizing: border-box;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  color: #0f172a;
  font-weight: 500;
}

input[type="text"]:focus,
input[type="email"]:focus {
  outline: none;
  border-color: var(--primary-color);
  box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
  background: #fff;
  transform: translateY(-1px);
}

/* Card Grid Layout */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 28px;
}

/* Premium Product Card */
.product-card {
  position: relative;
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(31, 38, 135, 0.03), 0 1px 3px rgba(0,0,0,0.02);
  transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
  display: flex;
  flex-direction: column;
}

.product-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 40px rgba(31, 38, 135, 0.08);
  border-color: rgba(99, 102, 241, 0.25);
}

/* Low Stock Badge */
.badge {
  position: absolute;
  top: 14px;
  right: 14px;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 800;
  border-radius: 20px;
  z-index: 10;
  letter-spacing: 0.5px;
}

.badge.low-stock {
  background: var(--danger-gradient);
  color: #fff;
  box-shadow: 0 4px 15px rgba(239, 68, 68, 0.35);
}

/* Card Image */
.card-image-wrapper {
  width: 100%;
  height: 190px;
  background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
  transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.card-image:hover {
  transform: scale(1.06);
}

.no-image {
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 600;
}

/* Card Info */
.card-info {
  padding: 22px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.card-title {
  margin: 0 0 12px 0;
  font-size: 16px;
  font-weight: 800;
  color: #0f172a;
  line-height: 1.45;
}

.card-price-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.price-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}

.price-value {
  font-size: 16px;
  font-weight: 800;
  color: var(--primary-color);
}

.card-stock-row {
  font-size: 13px;
  color: #475569;
  margin-bottom: 22px;
  font-weight: 500;
}

.card-stock-row.low {
  color: var(--danger-color);
  font-weight: 800;
}

/* Counter Widget */
.qty-selector {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  background: #f1f5f9;
  border-radius: 30px;
  padding: 5px;
  border: 1px solid rgba(0,0,0,0.02);
}

.qty-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: #fff;
  color: #0f172a;
  border-radius: 50%;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.qty-btn:hover {
  background: #fff;
  color: var(--primary-color);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
}

.qty-btn:active {
  transform: scale(0.92);
}

.qty-input {
  width: 50px;
  border: none;
  background: transparent;
  text-align: center;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 16px;
  font-weight: 800;
  color: #0f172a;
  margin: 0;
  padding: 0;
}

.qty-input::-webkit-outer-spin-button,
.qty-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.qty-input[type=number] {
  -moz-appearance: textfield;
}

.total-box {
  margin-top: 32px;
  text-align: right;
  font-size: 26px;
  font-weight: 800;
  color: #0f172a;
  letter-spacing: -0.5px;
}

.total-box span {
  color: var(--primary-color);
  background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.submit-area {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 48px;
}

button[type="submit"] {
  padding: 16px 48px;
  font-size: 18px;
  font-weight: 700;
  background: var(--primary-gradient);
  color: #fff;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
}

button[type="submit"]:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(99, 102, 241, 0.45);
}

button[type="submit"]:active {
  transform: translateY(0);
}

/* Form Navigation Style (右上角懸浮) */
.form-nav {
  position: absolute;
  top: 48px;
  right: 48px;
  display: flex;
  gap: 12px;
  z-index: 100;
}

.nav-btn {
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-muted);
  text-decoration: none;
  background: rgba(255, 255, 255, 0.5);
  border: 1px solid rgba(0, 0, 0, 0.05);
  border-radius: 12px;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.02);
}

.nav-btn:hover {
  color: var(--primary-color);
  background: #fff;
  border-color: rgba(99, 102, 241, 0.25);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
}

.nav-btn:active {
  transform: translateY(0);
}

/* Lightbox Modal */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.85);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.modal img {
  max-width: 85%;
  max-height: 85%;
  border-radius: 20px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  background: #fff;
}

.modal-close {
  position: absolute;
  top: 24px;
  right: 32px;
  font-size: 36px;
  color: #fff;
  cursor: pointer;
  transition: color 0.2s;
  font-family: sans-serif;
}

.modal-close:hover {
  color: var(--primary-color);
}

/* Setup Assistant Overlay */
.setup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.7);
  backdrop-filter: blur(12px);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.setup-card {
  background: #fff;
  padding: 40px;
  border-radius: 24px;
  max-width: 450px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  text-align: center;
}

.setup-card h2 {
  margin-top: 0;
  color: #0f172a;
  font-size: 22px;
  font-weight: 800;
}

.setup-card p {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 24px;
  line-height: 1.5;
}

.setup-input {
  width: 100%;
  padding: 14px;
  margin-bottom: 16px;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  box-sizing: border-box;
  font-size: 14px;
}

.setup-btn {
  width: 100%;
  padding: 14px;
  background: var(--primary-gradient);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
}

.setup-btn:hover {
  opacity: 0.9;
}

@media (max-width: 768px) {
  form {
    padding: 24px;
    border-radius: 20px;
  }
  .row {
    flex-direction: column;
    gap: 16px;
  }
  .submit-area {
    flex-direction: column;
    gap: 16px;
  }
  button[type="submit"] {
    width: 100%;
  }
  .form-nav {
    position: static;
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
    width: 100%;
  }
  .nav-btn {
    flex: 1;
    justify-content: center;
    font-size: 13px;
    padding: 8px 12px;
  }
}
</style>
</head>

<body>

<!-- 導覽連結移至表單內部右上角 -->

<h1>公關品資源管理系統</h1>
<div class="subtitle">Public Relations Resource Management System, PRRMS</div>

<!-- Supabase 連線設定小幫手 (僅在未填憑證時顯示) -->
<div id="setupAssistant" class="setup-overlay" style="display:none;">
  <div class="setup-card">
    <h2>🔑 串接您的 Supabase 專案</h2>
    <p>系統檢測到您尚未設定 Supabase 憑證。請輸入專案 URL 與 Anon Key 以進行資料庫連線：</p>
    <input type="text" id="setupUrl" class="setup-input" placeholder="Supabase Project URL (https://xxxx.supabase.co)" />
    <input type="text" id="setupKey" class="setup-input" placeholder="Supabase Anon Key" />
    <button type="button" class="setup-btn" onclick="saveCredentials()">確認並儲存</button>
  </div>
</div>

<form id="applyForm">
  <!-- 表單右上角導覽連結 -->
  <div class="form-nav">
    <a href="Items-status.html" class="nav-btn">📊 狀態看板</a>
    <a href="admin.html" class="nav-btn">⚙️ 後台管理</a>
  </div>

<fieldset>
  <legend>一、申請單位資料（必填）</legend>

  <div class="row">
    <label>申請人*<input type="text" name="applicant_name" required placeholder="請輸入姓名"></label>
    <label>院內員編*<input type="text" name="staff_id" required placeholder="請輸入員編"></label>
  </div>

  <div class="row">
    <label>申請者電話*<input type="text" name="phone" required placeholder="請輸入聯絡電話"></label>
    <label>電子信箱*<input type="email" name="applicant_email" required placeholder="請輸入院內電子郵件"></label>
  </div>

  <div class="row">
    <label>申請單位*<input type="text" name="department" required placeholder="請輸入處室/部門名稱"></label>
    <label>成本中心*<input type="text" name="costCenter" required placeholder="請輸入成本中心代碼"></label>
  </div>

  <div class="row">
    <label>領取事由*<input type="text" name="reason" required placeholder="請描述公關品領用用途或對象"></label>
  </div>
</fieldset>

<fieldset>
  <legend>二、公關品資源申請清單</legend>
  <!-- 卡片式呈現網格 -->
  <div class="card-grid" id="itemsGrid">
    <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px 0;">
      ⏳ 商品載入中，請稍候…
    </div>
  </div>
</fieldset>

<div class="total-box">
  總金額：NT$ <span id="totalAmount">0</span>
</div>

<div class="submit-area">
  <button type="submit">送出申請</button>
</div>

</form>

<!-- 圖片燈箱 -->
<div class="modal" id="imgModal">
  <span class="modal-close" id="modalClose">✕</span>
  <img id="modalImg" src="">
</div>

<script>
// =========================================================================
// 1. Supabase 憑證設定與初始化
// =========================================================================
const DEFAULT_SUPABASE_URL = 'https://awqrpzgkndysizvwqfmy.supabase.co';
const DEFAULT_SUPABASE_ANON_KEY = 'sb_publishable_6Km_NaLMwawXQD9lMH7aMw_AsQmjGU0';

let supabaseUrl = localStorage.getItem('supabaseUrl') || DEFAULT_SUPABASE_URL;
let supabaseKey = localStorage.getItem('supabaseKey') || DEFAULT_SUPABASE_ANON_KEY;

// 檢查是否需要顯示設定小幫手
if (supabaseUrl === 'YOUR_SUPABASE_URL' || supabaseKey === 'YOUR_SUPABASE_ANON_KEY' || !supabaseUrl || !supabaseKey) {
    document.getElementById('setupAssistant').style.display = 'flex';
}

function saveCredentials() {
    const url = document.getElementById('setupUrl').value.trim();
    const key = document.getElementById('setupKey').value.trim();
    if (!url || !key) {
        alert('請確實填寫 URL 與 Key');
        return;
    }
    localStorage.setItem('supabaseUrl', url);
    localStorage.setItem('supabaseKey', key);
    window.location.reload();
}

let supabaseClient = null;
if (supabaseUrl && supabaseUrl !== 'YOUR_SUPABASE_URL' && supabaseKey && supabaseKey !== 'YOUR_SUPABASE_ANON_KEY') {
    supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
}

// =========================================================================
// 2. 業務邏輯與畫面渲染
// =========================================================================
let items = [];

// 產生單號：PR-起單日期(YYYYMMDD)-隨機兩位大寫英文字
function generateTaskId() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const dateStr = `${y}${m}${day}`;
    
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const r1 = chars.charAt(Math.floor(Math.random() * chars.length));
    const r2 = chars.charAt(Math.floor(Math.random() * chars.length));
    return `PR-${dateStr}-${r1}${r2}`;
}

// 取得商品資料
async function fetchItems() {
    if (!supabaseClient) return;
    try {
        const { data, error } = await supabaseClient
            .from('items_list')
            .select('*')
            .order('item_id');
            
        if (error) throw error;
        items = data || [];
        renderCards();
    } catch (err) {
        console.error('讀取商品庫存失敗:', err);
        document.getElementById('itemsGrid').innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; color: var(--danger-color); padding: 40px 0; font-weight: bold;">
                ⚠️ 庫存載入失敗，請檢查 Supabase 連線或資料庫 Table 是否建立！
            </div>
        `;
    }
}

// 渲染卡片式商品版面
function renderCards() {
    const grid = document.getElementById('itemsGrid');
    if (!grid) return;
    grid.innerHTML = '';
    
    if (items.length === 0) {
        grid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px 0;">
                📭 目前無上架商品。
            </div>
        `;
        return;
    }

    items.forEach(i => {
        const isLow = i.inventory <= 10;
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            ${isLow ? '<span class="badge low-stock">低庫存</span>' : ''}
            <div class="card-image-wrapper">
                ${i.image ? `<img src="${i.image}" class="card-image" alt="${i.item_name}">` : '<div class="no-image">無圖片</div>'}
            </div>
            <div class="card-info">
                <h3 class="card-title">${i.item_name}</h3>
                <div class="card-price-row">
                    <span class="price-label">單價</span>
                    <span class="price-value">NT$ ${Number(i.price).toFixed(2)}</span>
                </div>
                <div class="card-stock-row ${isLow ? 'low' : ''}">
                    <span>庫存量：${i.inventory}</span>
                </div>
                <div class="qty-selector">
                    <button type="button" class="qty-btn minus" onclick="adjustQty('${i.item_id}', -1)">−</button>
                    <input type="number" min="0" max="${i.inventory}" 
                           data-id="${i.item_id}" 
                           value="0"
                           class="qty-input"
                           oninput="onQtyChange('${i.item_id}', this)">
                    <button type="button" class="qty-btn plus" onclick="adjustQty('${i.item_id}', 1)">+</button>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
}

// 數量按鈕調整
window.adjustQty = (itemId, change) => {
    const input = document.querySelector(`.qty-input[data-id="${itemId}"]`);
    if (!input) return;
    const max = parseInt(input.max) || 0;
    let val = parseInt(input.value) || 0;
    val = Math.max(0, Math.min(max, val + change));
    input.value = val;
    updateTotalAmount();
};

// 數量輸入框手動輸入
window.onQtyChange = (itemId, input) => {
    const max = parseInt(input.max) || 0;
    let val = parseInt(input.value) || 0;
    if (isNaN(val) || val < 0) val = 0;
    if (val > max) val = max;
    input.value = val;
    updateTotalAmount();
};

// 即時更新總金額
function updateTotalAmount() {
    let total = 0;
    const inputs = document.querySelectorAll('.qty-input');
    inputs.forEach(inp => {
        const it = items.find(item => item.item_id == inp.dataset.id);
        const q = parseInt(inp.value) || 0;
        if (it) total += q * Number(it.price);
    });
    document.getElementById('totalAmount').textContent = total.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// 跳轉函數已移除，改由頂部導覽列超連結直接處理

document.addEventListener('DOMContentLoaded', () => {
    const applyForm = document.getElementById('applyForm');
    const totalAmountEl = document.getElementById('totalAmount');
    const grid = document.getElementById('itemsGrid');
    const modal = document.getElementById('imgModal');
    const modalImg = document.getElementById('modalImg');
    const modalClose = document.getElementById('modalClose');

    // 初始載入
    if (supabaseClient) {
        fetchItems();
    }

    // 燈箱控制
    grid.onclick = e => {
        if (e.target.classList.contains('card-image')) {
            modalImg.src = e.target.src;
            modal.style.display = 'flex';
        }
    };
    if (modalClose) modalClose.onclick = () => modal.style.display = 'none';
    window.onclick = e => { if (e.target === modal) modal.style.display = 'none'; };

    // 送出申請
    applyForm.onsubmit = async (e) => {
        e.preventDefault();
        
        if (!supabaseClient) {
            alert('請先填寫 Supabase 連線憑證！');
            return;
        }

        const task_id = generateTaskId();

        // 收集要申請的品項與資訊
        const itemIds = [];
        const itemNames = [];
        const prices = [];
        const quantities = [];
        let totalAmount = 0;

        grid.querySelectorAll('.qty-input').forEach(inp => {
            const q = parseInt(inp.value) || 0;
            if (q > 0) {
                const it = items.find(item => item.item_id == inp.dataset.id);
                if (it) {
                    itemIds.push(it.item_id);
                    itemNames.push(it.item_name);
                    prices.push(it.price);
                    quantities.push(q);
                    totalAmount += it.price * q;
                }
            }
        });

        if (itemIds.length === 0) {
            alert('請至少選擇一個品項並填寫大於 0 的數量');
            return;
        }

        const submitBtn = applyForm.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = '申請提交中...';

        try {
            // 呼叫原子性 RPC 提交函數（新增申請、寫入明細、更新庫存一次完成）
            const { error } = await supabaseClient.rpc('create_promo_application', {
                p_task_id: task_id,
                p_applicant_name: applyForm.applicant_name.value,
                p_staff_id: applyForm.staff_id.value,
                p_phone: applyForm.phone.value,
                p_email: applyForm.applicant_email.value,
                p_department: applyForm.department.value,
                p_cost_center: applyForm.costCenter.value,
                p_reason: applyForm.reason.value,
                p_total_amount: totalAmount,
                p_item_ids: itemIds,
                p_item_names: itemNames,
                p_prices: prices,
                p_quantities: quantities
            });

            if (error) throw error;

            alert('🎉 申請成功！單號為：' + task_id);
            applyForm.reset();
            totalAmountEl.textContent = '0';
            
            // 重新整理商品清單
            await fetchItems();
        } catch (err) {
            alert('❌ 申請失敗，錯誤訊息：' + (err.message || '資料庫寫入異常'));
            console.error('Submit Error:', err);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '送出申請';
        }
    };
});
</script>

</body>
</html>
